# 枪战突击 · COMBAT STRIKE — docker-compose 生产编排
# 用法（国内 VPS，已装 Docker）：
#   docker compose up -d --build
# 数据库持久化到宿主 ./data 目录（映射到容器内 /data，DB_PATH 已设为 /data/app.sqlite）
services:
  fps-arena:
    build: .
    image: fps-arena:latest
    container_name: fps-arena
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/app.sqlite
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
