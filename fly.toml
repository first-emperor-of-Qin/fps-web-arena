# Fly.io 部署配置 —— 香港节点（免费档 + 离大陆最近、国内流畅）
# 用法（本地装好 flyctl 后）：
#   flyctl auth login
#   flyctl launch --no-deploy   # 第一次生成 app 并绑定本配置
#   flyctl deploy
# 之后更新代码：git push 后直接 flyctl deploy
#
# 说明：
# - primary_region = hkg（香港）：延迟对大陆用户最低
# - 免费档为 shared-cpu-1x / 256MB；本游戏后端很轻量，够用
# - 进程数 processes.app 即我们的 node server/index.js
# - 内部监听 3000（Dockerfile 已 EXPOSE 3000），Fly 外部 443/80 自动转发并支持 WebSocket

app = "fps-arena"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/app.sqlite"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # 免费档：无流量时自动停机，省钱（首次访问有数秒冷启动）
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/api/health"

# 持久盘（SQLite 数据库）：免费档含 3GB 卷额度
[mounts]
  source = "fps_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
  processes = ["app"]
