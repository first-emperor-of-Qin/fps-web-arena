# Nginx 反代配置（可选）：自定义域名 + HTTPS 时使用
# 放在 /etc/nginx/conf.d/fps-arena.conf，执行 nginx -t && systemctl reload nginx
# 前端 WebSocket 走同源，页面是 https 时会自动用 wss://，无需改代码。

server {
    listen 80;
    server_name your-domain.com;   # 改成你的域名

    # 证书申请用（certbot 会自动补 443 配置）
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 长连接/WS 不被 nginx 掐断
    }
}

